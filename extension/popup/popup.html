<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Translator</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">IT</div>
        <div class="brand-text">
          <div class="brand-title">Image Translator</div>
          <div class="brand-subtitle">Scan or click to translate</div>
        </div>
      </div>
    </header>

    <section class="card">
      <div class="row">
        <button class="btn btn-primary" id="scanPage-Id">Scan all images</button>
        <button class="btn btn-accent" id="clickMode-Id">Click to translate</button>
      </div>

      <div class="field">
        <label class="field-label" for="language-Id">Target language</label>
        <select id="language-Id" class="select">
          <option value="en" selected>English</option>
          <option value="vi">Vietnamese</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="fr">French</option>
          <option value="de">German</option>
        </select>
      </div>

      <div class="hint" id="status-Id">Ready.</div>
    </section>

    <section class="card card-muted">
      <div class="card-header">
        <div class="card-title">Server</div>
      </div>
      <div class="server">
        <input id="serverUrl-Id" class="input" type="text" placeholder="http://localhost:3000" />
        <button class="btn btn-secondary" id="saveServerUrl-Id">Save</button>
      </div>
      <div class="hint">Backend endpoint for <code>/vision-translate</code>.</div>
    </section>
  </div>
</body>
<script src="popup-main.js"></script>
</html>
